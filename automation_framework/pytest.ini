[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .

# Markers — keeps pytest from warning about unknown marks
markers =
    ui:         User-interface (Selenium) tests
    api:        REST API tests (requests-based, no browser)
    db:         Direct database tests via psycopg2
    smoke:      Quick sanity checks — run before deeper suites
    regression: Full regression suite

# Default flags applied to every run
addopts =
    --html=reports/report.html
    --self-contained-html
    -v
    --tb=short
